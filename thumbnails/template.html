<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,900&family=Noto+Sans+JP:wght@400;500;700;900&display=swap');
body { width: 800px; height: 450px; overflow: hidden; }
.container {
  width: 800px; height: 450px; background: #fff; border-radius: 10px;
  position: relative; overflow: hidden;
  font-family: 'Noto Sans JP', 'DM Sans', sans-serif;
}
.green-bar {
  position: absolute; bottom: 0; left: 0; width: 800px; height: 70px;
  background: #15cf78;
}
.logo {
  position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
  display: flex; align-items: center; gap: 6px;
}
.logo-box {
  width: 23px; height: 23px; border: 4px solid #fff; border-radius: 4px;
}
.logo-text {
  font-family: 'DM Sans', sans-serif; font-weight: 900; font-size: 29px;
  color: #fff; letter-spacing: 1.4px;
}
.content {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, calc(-50% - 26px));
  text-align: center; display: flex; flex-direction: column; align-items: center; gap: 18px;
}
.catch {
  font-size: 25px; font-weight: 500; color: #767f93; letter-spacing: 2.5px;
}
.title {
  font-weight: 900; color: #15152b; line-height: 1.36;
}
.title .line1 { font-size: 46px; }
.title .line2 { font-size: 48px; }
.title .accent { color: #15cf78; }
.sub {
  font-size: 25px; font-weight: 400; color: #767f93;
}
.emoji1 {
  position: absolute; right: 120px; bottom: 100px; font-size: 55px;
}
.emoji2 {
  position: absolute; right: 60px; bottom: 118px; font-size: 55px;
}
</style>
</head>
<body>
<div class="container">
  <div class="green-bar"></div>
  <div class="logo">
    <div class="logo-box"></div>
    <span class="logo-text">TASKUL</span>
  </div>
  <div class="content">
    <p class="catch">\ テンプレ探しはもう不要 /</p>
    <div class="title">
      <p class="line1">Web制作の</p>
      <p class="line2"><span class="accent">案件管理</span>テンプレ</p>
    </div>
    <p class="sub">AIが自動生成する時代へ</p>
  </div>
  <span class="emoji1">📋</span>
  <span class="emoji2">✨</span>
</div>
</body>
</html>
