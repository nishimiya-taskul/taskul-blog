name: PR Safety Check

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  check-no-deletions:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout base branch
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Fetch PR branch
        run: git fetch origin ${{ github.event.pull_request.head.ref }}

      - name: Check for dangerous changes
        run: |
          echo "## PR Safety Check" >> $GITHUB_STEP_SUMMARY

          # Get diff stat between main and PR
          DIFF=$(git diff --name-status main..FETCH_HEAD)
          echo "### Changed files:" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "$DIFF" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          # Check for deleted files (lines starting with D)
          DELETED=$(echo "$DIFF" | grep '^D' | awk '{print $2}' || true)
          if [ -n "$DELETED" ]; then
            echo "::error::PR deletes existing files. This is not allowed."
            echo "### BLOCKED: Files being deleted:" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "$DELETED" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

          # Check for modified files in protected paths
          PROTECTED=$(echo "$DIFF" | grep '^M' | awk '{print $2}' | grep -E '^(src/|CLAUDE\.md|ops/OPS\.md|\.github/)' || true)
          if [ -n "$PROTECTED" ]; then
            echo "::error::PR modifies protected files. This is not allowed."
            echo "### BLOCKED: Protected files being modified:" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "$PROTECTED" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

          echo "### Result: PASS" >> $GITHUB_STEP_SUMMARY
          echo "No deletions or protected file modifications detected."
